<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <title>NCDB Monitor</title>

    <style>

        body {
            font-family: sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        .dataset {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .plot {
            margin-top: 20px;
        }

        img {
            max-width: 100%;
            border: 1px solid #ccc;
        }

    </style>

</head>

<body>

<h1>NCDB Monitor</h1>

{% for dataset in website.datasets %}

<div class="dataset">

    <h2>{{ dataset.name }}</h2>

    {% for plot in dataset.plots %}

    <div class="plot">

        <h3>{{ plot.name }}</h3>

        <img
            src="{{ dataset.name }}/nobs/{{ plot.path }}"
            alt="{{ plot.name }}"
        >

    </div>

    {% endfor %}

</div>

{% endfor %}

</body>

</html>

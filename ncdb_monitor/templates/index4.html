<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <title>NCDB Monitor</title>

    <style>

        body {
            font-family: sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        .tabs {
            margin-bottom: 20px;
        }

        .tab-button {
            padding: 10px 20px;
            margin-right: 10px;
            border: none;
            border-radius: 5px;
            background: #cccccc;
            cursor: pointer;
        }

        .tab-button.active {
            background: #4a90e2;
            color: white;
        }

        .dataset {
            display: none;
        }

        .dataset.active {
            display: block;
        }

        .plot {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        img {
            max-width: 100%;
            border: 1px solid #ccc;
            background: white;
        }

    </style>

    <script>

        function showDataset(name) {

            const datasets =
                document.querySelectorAll(".dataset");

            datasets.forEach(dataset => {
                dataset.classList.remove("active");
            });

            const buttons =
                document.querySelectorAll(".tab-button");

            buttons.forEach(button => {
                button.classList.remove("active");
            });

            document
                .getElementById("dataset-" + name)
                .classList
                .add("active");

            document
                .getElementById("button-" + name)
                .classList
                .add("active");
        }

        window.onload = function() {

            const first =
                document.querySelector(".tab-button");

            if (first) {
                first.click();
            }
        };

    </script>

</head>

<body>

<h1>NCDB Monitor</h1>


<div class="tabs">

    {% for dataset in website.datasets %}

    <button
        class="tab-button"
        id="button-{{ dataset.name }}"
        onclick="showDataset('{{ dataset.name }}')"
    >

        {{ dataset.name }}

    </button>

    {% endfor %}

</div>


{% for dataset in website.datasets %}

<div
    class="dataset"
    id="dataset-{{ dataset.name }}"
>

    <h2>{{ dataset.name }}</h2>

	{% for metric_name, plots in dataset.metrics.items() %}

	<h3>{{ metric_name }}</h3>

	{% for plot in plots %}

	<div class="plot">

		<h4>{{ plot.name }}</h4>

		<img
			src="{{ dataset.name }}/{{ metric_name }}/{{ plot.path }}"
			alt="{{ plot.name }}"
		>

	</div>

	{% endfor %}
	{% endfor %}

</div>

{% endfor %}

</body>

</html>
